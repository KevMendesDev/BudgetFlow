spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: ${DEVELOPMENT:false}

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
    cookies:
      secure: ${COOKIE_SECURE:true}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}
