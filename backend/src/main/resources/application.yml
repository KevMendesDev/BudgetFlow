spring:
  application:
    name: budgetflow
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/master.xml
  docker:
    compose:
      enabled: false
server:
  address: 0.0.0.0
  port: 8080

app:
  security:
    jwt:
      access-token-minutes: 15
      refresh-token-days: 30
    cookies:
      secure: ${COOKIE_SECURE:false}
      same-site: LAX
      domain: ${COOKIE_DOMAIN:}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:}
