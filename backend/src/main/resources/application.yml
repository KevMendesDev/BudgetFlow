spring:
  application:
    name: budgetflow
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/budgetflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${DEVELOPMENT:false}
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/master.xml
  docker:
    compose:
      enabled: false
server:
  address: 0.0.0.0
  port: 8080

app:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_ME_USE_A_STRONG_SECRET_OF_AT_LEAST_32_BYTES}
      access-token-minutes: 15
      refresh-token-days: 30
    cookies:
      secure: ${COOKIE_SECURE:false}
      same-site: LAX
      domain: ${COOKIE_DOMAIN:localhost}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

