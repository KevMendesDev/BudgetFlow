<details class="theme-menu" #menu>
  <summary aria-label="Alterar tema" title="Alterar tema">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3v2m0 14v2M3 12h2m14 0h2M5.6 5.6 7 7m10 10 1.4 1.4M18.4 5.6 17 7M7 17l-1.4 1.4" />
      <circle cx="12" cy="12" r="4" />
    </svg>
  </summary>

  <div class="theme-options" role="group" aria-label="Tema da aplicacao">
    <button [class.active]="themeMode() === 'system'" (click)="setThemeMode('system', menu)" type="button">
      Sistema
    </button>
    <button [class.active]="themeMode() === 'light'" (click)="setThemeMode('light', menu)" type="button">
      Claro
    </button>
    <button [class.active]="themeMode() === 'dark'" (click)="setThemeMode('dark', menu)" type="button">
      Escuro
    </button>
  </div>
</details>
