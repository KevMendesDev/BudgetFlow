  @if (errorMessage()) {
    <p class="auth-error mt-3 text-sm">{{ errorMessage() }}</p>
  }

  <form class="bf-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label class="bf-label">
      Nome
      <input class="bf-input" type="text" formControlName="nome" placeholder="Seu nome" />
      @if (fieldError(form.controls.nome, 'Nome')) {
        <small class="bf-error">{{ fieldError(form.controls.nome, 'Nome') }}</small>
      }
    </label>

    <label class="bf-label">
      E-mail
      <input class="bf-input" type="email" formControlName="email" placeholder="voce@email.com" />
      @if (fieldError(form.controls.email, 'Email')) {
        <small class="bf-error">{{ fieldError(form.controls.email, 'Email') }}</small>
      }
    </label>

    <label class="bf-label">
      Telefone (opcional)
      <input
        class="bf-input"
        type="text"
        formControlName="telefone"
        placeholder="(11) 99999-9999"
        inputmode="numeric"
        maxlength="15"
        (input)="onPhoneInput()"
      />
      @if (fieldError(form.controls.telefone, 'Telefone')) {
        <small class="bf-error">{{ fieldError(form.controls.telefone, 'Telefone') }}</small>
      }
    </label>

    <label class="bf-label">
      Senha
      <input class="bf-input" type="password" formControlName="senha" placeholder="mínimo de 8 caracteres" />
      @if (fieldError(form.controls.senha, 'Senha')) {
        <small class="bf-error">{{ fieldError(form.controls.senha, 'Senha') }}</small>
      }
    </label>

    <button class="btn-create" type="submit" [disabled]="loading()">
      {{ loading() ? 'Criando...' : 'Criar conta' }}
    </button>
  </form>

  <p class="mt-4 text-sm text-[var(--muted-text)]">
    Já tem conta?
    <a class="bf-link" routerLink="/login">Entrar</a>
  </p>
</div>
