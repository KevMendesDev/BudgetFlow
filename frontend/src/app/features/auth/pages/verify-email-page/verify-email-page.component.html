<div class="bf-auth-card">
  <p class="m-0 text-[0.78rem] uppercase tracking-[0.08em] text-[var(--brand-amber)]">Confirmação</p>
  <h2 class="mt-1 font-[var(--font-display)] text-3xl">Verifique seu email</h2>
  <p class="mt-2 text-[var(--muted-text)]">{{ message() }}</p>

  @if (errorMessage()) {
    <p class="auth-error mt-3 text-sm">{{ errorMessage() }}</p>
  }

  <form class="bf-form" [formGroup]="form" (ngSubmit)="resend()" novalidate>
    <label class="bf-label">
      Email
      <input class="bf-input" type="email" formControlName="email" autocomplete="email" />
      @if (fieldError(form.controls.email, 'Email')) {
        <small class="bf-error">{{ fieldError(form.controls.email, 'Email') }}</small>
      }
    </label>
    <button class="btn-create" type="submit" [disabled]="loading() || cooldownSeconds() > 0">
      @if (loading()) {
        Enviando...
      } @else if (cooldownSeconds() > 0) {
        Reenviar em {{ cooldownSeconds() }}s
      } @else {
        Reenviar confirmação
      }
    </button>
    @if (cooldownSeconds() > 0) {
      <p class="m-0 text-sm text-[var(--muted-text)]">
        Você só poderá enviar outro email em {{ cooldownSeconds() }}s.
      </p>
    }
  </form>

  <p class="mt-4 text-sm"><a class="bf-link" routerLink="/login">Voltar ao login</a></p>
</div>
