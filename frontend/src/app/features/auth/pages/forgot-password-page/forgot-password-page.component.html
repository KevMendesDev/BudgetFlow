<div class="bf-auth-card">
  <p class="m-0 text-[0.78rem] uppercase tracking-[0.08em] text-[var(--brand-amber)]">Recuperação</p>
  <h2 class="mt-1 font-[var(--font-display)] text-3xl">Esqueci minha senha</h2>
  <p class="mt-2 text-[var(--muted-text)]">Informe seu email para receber o link de recuperação.</p>

  @if (message()) {
    <p class="mt-3 text-sm text-[var(--success-text)]">{{ message() }}</p>
  }
  @if (errorMessage()) {
    <p class="auth-error mt-3 text-sm">{{ errorMessage() }}</p>
  }

  <form class="bf-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label class="bf-label">
      Email
      <input class="bf-input" type="email" formControlName="email" autocomplete="email" />
      @if (fieldError(form.controls.email, 'Email')) {
        <small class="bf-error">{{ fieldError(form.controls.email, 'Email') }}</small>
      }
    </label>
    <button class="btn-create" type="submit" [disabled]="loading()">
      {{ loading() ? 'Enviando...' : 'Enviar link' }}
    </button>
  </form>

  <p class="mt-4 text-sm"><a class="bf-link" routerLink="/login">Voltar ao login</a></p>
</div>
