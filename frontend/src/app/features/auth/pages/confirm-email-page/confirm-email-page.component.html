<div class="bf-auth-card">
  <p class="m-0 text-[0.78rem] uppercase tracking-[0.08em] text-[var(--brand-amber)]">Confirmação</p>
  <h2 class="mt-1 font-[var(--font-display)] text-3xl">Confirmando email</h2>
  @if (loading()) {
    <p class="mt-3 text-[var(--muted-text)]">Validando seu link...</p>
  } @else {
    <p class="auth-error mt-3 text-sm">{{ errorMessage() }}</p>
    <a class="bf-link text-sm" routerLink="/verificar-email">Solicitar outro link</a>
  }
</div>
