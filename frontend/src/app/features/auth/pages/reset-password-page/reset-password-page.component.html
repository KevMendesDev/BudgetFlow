<div class="bf-auth-card">
  <p class="m-0 text-[0.78rem] uppercase tracking-[0.08em] text-[var(--brand-amber)]">Recuperação</p>
  <h2 class="mt-1 font-[var(--font-display)] text-3xl">Criar nova senha</h2>

  @if (errorMessage()) {
    <p class="auth-error mt-3 text-sm">{{ errorMessage() }}</p>
  }

  <form class="bf-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label class="bf-label">
      Nova senha
      <input class="bf-input" type="password" formControlName="senha" autocomplete="new-password" />
      @if (fieldError(form.controls.senha, 'Senha')) {
        <small class="bf-error">{{ fieldError(form.controls.senha, 'Senha') }}</small>
      }
    </label>
    <label class="bf-label">
      Confirmar nova senha
      <input class="bf-input" type="password" formControlName="confirmarSenha" autocomplete="new-password" />
      @if (fieldError(form.controls.confirmarSenha, 'Confirmação')) {
        <small class="bf-error">{{ fieldError(form.controls.confirmarSenha, 'Confirmação') }}</small>
      }
    </label>
    <button class="btn-create" type="submit" [disabled]="loading()">
      {{ loading() ? 'Alterando...' : 'Alterar senha' }}
    </button>
  </form>

  <p class="mt-4 text-sm"><a class="bf-link" routerLink="/login">Voltar ao login</a></p>
</div>
